<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドッグケアレッスン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --border: #d4c9b0;
    --text: #2c2416;
    --muted: #8a7d65;
    --accent: #6b9e78;
    --accent-light: #e8f3eb;
    --locked: #cdc5b4;
    --locked-bg: #edeae3;
    --gold: #c4a84a;
    --gold-light: #fdf6e3;
    --shadow: rgba(44,36,22,0.08);
    --danger: #c0614a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-row { display: flex; align-items: center; gap: 10px; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); padding: 2px 6px 2px 0; display: none; }
  .back-btn.visible { display: block; }
  .header-icon { font-size: 20px; }
  .header-title { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 600; letter-spacing: 0.05em; flex: 1; }
  .header-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-top: 3px; padding-left: 2px; }
  .progress-bar-wrap { margin: 12px 0 0; background: var(--border); border-radius: 4px; height: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 4px; transition: width 0.6s ease; }
  .progress-label { font-size: 10px; color: var(--muted); margin: 5px 0 0; text-align: right; letter-spacing: 0.04em; }

  .screen { display: none; }
  .screen.active { display: block; }
  .screen-pad { padding: 24px 20px 0; }
  .section-title { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 14px; text-transform: uppercase; }

  .dog-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .dog-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 2px 8px var(--shadow); }
  .dog-card:active { transform: scale(0.98); }
  .dog-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .dog-info { flex: 1; }
  .dog-name { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .dog-meta { font-size: 11px; color: var(--muted); }
  .dog-arrow { color: var(--locked); font-size: 16px; }
  .dog-card.add-card { border-style: dashed; background: transparent; box-shadow: none; color: var(--muted); }
  .dog-card.add-card .dog-avatar { background: transparent; border-color: var(--border); color: var(--muted); font-size: 18px; }

  .add-dog-form { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; display: none; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .add-dog-form.open { display: flex; }
  .form-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .emoji-opt { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; }
  .emoji-opt.selected { border-color: var(--gold); background: var(--gold-light); }
  input.text-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; }
  input.text-input:focus { border-color: var(--accent); }
  input.text-input::placeholder { color: var(--locked); }
  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 11px 0; border: none; border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--text); color: var(--surface); }
  .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); flex: 0 0 auto; padding: 11px 18px; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 12px; padding: 8px 14px; flex: 0 0 auto; border-radius: 8px; }

  .menu-header-info { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .menu-dog-avatar { font-size: 28px; }
  .menu-dog-name { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 600; }
  .menu-dog-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .menu-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 2px 6px var(--shadow); display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
  .menu-card:active { transform: scale(0.97); }
  .menu-card-icon { font-size: 28px; }
  .menu-card-icon img { width: 60px; height: 60px; object-fit: contain; }
  .menu-card-title { font-family: 'Shippori Mincho', serif; font-size: 13px; font-weight: 600; line-height: 1.4; }
  .menu-card-progress { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .menu-card-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .menu-card-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; transition: width 0.4s; }

  .stages { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 10px; }
  .stage-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; }
  .stage-card.unlocked { cursor: pointer; box-shadow: 0 2px 8px var(--shadow); }
  .stage-card.unlocked:active { transform: scale(0.98); }
  .stage-card.locked { background: var(--locked-bg); border-color: transparent; opacity: 0.65; }
  .stage-card.completed { border-color: var(--accent); background: var(--accent-light); }
  .stage-card.current { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(196,168,74,0.18), 0 2px 12px var(--shadow); }

  .stage-header { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
  .stage-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .unlocked .stage-num { background: var(--text); color: var(--surface); }
  .completed .stage-num { background: var(--accent); color: white; }
  .current .stage-num { background: var(--gold); color: white; }
  .locked .stage-num { background: var(--locked); color: var(--surface); }
  .stage-info { flex: 1; }
  .stage-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 2px; }
  .stage-title { font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 600; line-height: 1.4; }
  .locked .stage-title { color: var(--locked); }
  .stage-badge { font-size: 17px; flex-shrink: 0; }

  .stage-body { display: none; border-top: 1px solid var(--border); }
  .stage-body.open { display: block; }
  .stage-desc { font-size: 12px; color: var(--muted); line-height: 1.8; padding: 12px 16px; border-bottom: 1px dashed var(--border); }

  .checklist { padding: 12px 16px; border-bottom: 1px dashed var(--border); display: flex; flex-direction: column; gap: 7px; }
  .checklist-title { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 2px; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--bg); border-radius: 10px; border: 1.5px solid transparent; cursor: pointer; transition: border-color 0.2s, background 0.2s; user-select: none; }
  .check-item.checked { background: var(--accent-light); border-color: var(--accent); }
  .check-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; color: transparent; transition: border-color 0.2s, background 0.2s; }
  .check-item.checked .check-box { background: var(--accent); border-color: var(--accent); color: white; }
  .check-text { font-size: 12px; line-height: 1.4; flex: 1; }
  .check-item.checked .check-text { color: var(--accent); }
  .check-hint { font-size: 10px; color: var(--muted); text-align: center; padding: 3px 0 0; }

  .log-section { padding: 12px 16px 16px; }
  .log-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .log-title { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .undo-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 10px; color: var(--muted); cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif; transition: border-color 0.2s, color 0.2s; }
  .undo-btn:hover { border-color: var(--danger); color: var(--danger); }
  .undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .log-entries { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; max-height: 150px; overflow-y: auto; }
  .log-entry { background: var(--bg); border-radius: 8px; padding: 7px 10px; font-size: 11px; line-height: 1.6; }
  .log-date { font-size: 9px; color: var(--muted); margin-bottom: 1px; }
  .log-input-wrap { display: flex; flex-direction: column; gap: 7px; }
  textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; color: var(--text); resize: none; height: 68px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--locked); }
  .log-btn-row { display: flex; gap: 7px; }
  .btn-log { background: var(--text); color: var(--surface); flex: 1; padding: 9px 0; border: none; border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-clr { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 9px 14px; border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; cursor: pointer; }
  .btn-complete { background: var(--gold); color: white; width: 100%; padding: 11px; margin-top: 4px; border: none; border-radius: 10px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; }
  .btn-complete:disabled { background: var(--locked); color: var(--surface); cursor: not-allowed; opacity: 0.5; }

  @keyframes unlockPop { 0% { transform: scale(0.9); opacity: 0; } 60% { transform: scale(1.03); } 100% { transform: scale(1); opacity: 1; } }
  .just-unlocked { animation: unlockPop 0.5s ease forwards; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--surface); padding: 9px 20px; border-radius: 20px; font-size: 12px; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; z-index: 200; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .delete-dog-wrap { margin-top: 20px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
    <span class="header-icon" id="headerIcon">🐾</span>
    <span class="header-title" id="headerTitle">ドッグケアレッスン</span>
  </div>
  <div class="header-sub" id="headerSub">BASE TRAINING</div>
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel" style="display:none"></div>
</div>

<div class="screen active" id="screenDog">
  <div class="screen-pad">
    <div class="section-title">犬を選ぶ</div>
    <div class="dog-list" id="dogList"></div>
    <div class="add-dog-form" id="addDogForm">
      <div class="form-label">アイコン</div>
      <div class="emoji-row" id="emojiRow"></div>
      <div class="form-label">名前</div>
      <input class="text-input" id="newDogName" type="text" placeholder="なまえを入力" maxlength="20">
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveDog()">追加する</button>
        <button class="btn btn-cancel" onclick="cancelAddDog()">キャンセル</button>
      </div>
    </div>
    <div class="dog-list">
      <div class="dog-card add-card" id="addDogBtn" onclick="showAddDogForm()">
        <div class="dog-avatar">＋</div>
        <div class="dog-info"><div class="dog-name" style="font-family:inherit;font-size:14px;color:var(--muted)">新しい犬を追加</div></div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screenMenu">
  <div class="screen-pad">
    <div class="menu-header-info" id="menuDogInfo"></div>
    <div class="section-title">メニューを選ぶ</div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="delete-dog-wrap">
      <button class="btn-danger" onclick="confirmDeleteDog()">この犬のデータを削除</button>
    </div>
  </div>
</div>

<div class="screen" id="screenTraining">
  <div class="stages" id="stagesContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DOG_EMOJIS = ["🐕","🐩","🦮","🐕‍🦺","🐶","🐾","🦴","🌸","⭐","🍀"];

const MENUS = [

        checks: [

      },
      {
        title: "ふせを継続できる",
        desc: "ふせの姿勢をしばらくキープできる状態。",
        checks: [

          "ふせのままごほうびを5回受け取れる",
        ]
      },
      {

        desc: "体のいろんな部位を触られても姿勢を崩さずにいられる状態。",
        checks: [

          "足を触られてもふせ継続",
        ]

        desc: "ごほうびが目の前にあっても衝動的に動かず、ふせのまま受け取れる状態。",
        checks: [
          "片手に持ったごほうびが届く位置にあってもふせして受け取れる",

  },
  {
    id: "ote", icon: "ote.png", title: "おて",
    stages: [
      {

          "手のひらに前足を乗せられる",
        ]
      },
      {
        title: "おてを継続できる",

        checks: [

          "爪を触られてもおて継続",
          "肉球を触られてもおて継続",
        ]
      },
      {
        title: "おてをしたまま落ち着いてごほうびを受け取れる",
        desc: "ごほうびが目の前にあっても衝動的に動かず、おてのまま受け取れる状態。",
        checks: [
          "片手に持ったごほうびが届く位置にあってもおてして受け取れる",
          "ごほうびが床に置かれていても勝手に食べずおてして受け取れる",

  {
    id: "ago", icon: "ago.png", title: "あご",
    stages: [
      {

        checks: [
          "手のひらにあごを乗せられる",
        ]
      },
      {
        title: "あごをキープできる",
        desc: "あごを手のひらに乗せたままキープできる状態。",
        checks: [
          "あごのまま3秒キープできる",
          "あごのまま5秒キープできる",
        ]
      },
      {
        title: "あごをしたまま触れる",
        desc: "頭や口周りを触られてもあごを乗せたままでいられる状態。",
        checks: [
          "頭を触られてもあご継続",
          "耳を触られてもあご継続",
          "口周りを触られてもあご継続",
        ]
      },
      {
        title: "あごをしたまま落ち着いてごほうびを受け取れる",
        desc: "ごほうびが目の前にあっても衝動的に動かず、あごのまま受け取れる状態。",
        checks: [
          "片手に持ったごほうびが届く位置にあってもあごして受け取れる",
          "ごほうびが床に置かれていても勝手に食べずあごして受け取れる",

const P = "base01_";
const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
const load = (k,d) => { try { const v = localStorage.getItem(k); return v!==null?JSON.parse(v):d; } catch(e){return d;} };
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
const fmtDate = ts => { const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

let dogs = [];
let currentDogId = null;
let currentMenuId = null;
let openStageIdx = null;
let history = [];

function loadDogs() { dogs = load(P+"dogs", []); }
function saveDogs() { save(P+"dogs", dogs); }
function dogKey(dogId, menuId, type) { return `${P}${dogId}_${menuId}_${type}`; }
function loadCompleted(dogId, menuId) { return load(dogKey(dogId,menuId,"done"), []); }
function saveCompleted(dogId, menuId, val) { save(dogKey(dogId,menuId,"done"), val); }
function loadChecks(dogId, menuId, stageIdx) { return load(dogKey(dogId,menuId,"chk_"+stageIdx), {}); }
function saveChecks(dogId, menuId, stageIdx, val) { save(dogKey(dogId,menuId,"chk_"+stageIdx), val); }
function loadLogs(dogId, menuId, stageIdx) { return load(dogKey(dogId,menuId,"log_"+stageIdx), []); }
function saveLogs(dogId, menuId, stageIdx, val) { save(dogKey(dogId,menuId,"log_"+stageIdx), val); }

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function goBack() {
  if (currentMenuId !== null) {
    currentMenuId = null; openStageIdx = null; history = [];
    renderMenuScreen(); showScreen("screenMenu"); updateHeader("menu");
  } else if (currentDogId !== null) {
    currentDogId = null;
    renderDogScreen(); showScreen("screenDog"); updateHeader("dog");
  }
}

function updateHeader(mode) {
  const backBtn = document.getElementById("backBtn");
  const icon = document.getElementById("headerIcon");
  const title = document.getElementById("headerTitle");
  const sub = document.getElementById("headerSub");
  const pw = document.getElementById("progressWrap");
  const pl = document.getElementById("progressLabel");
  if (mode === "dog") {
    backBtn.classList.remove("visible"); icon.textContent = "🐾";
    title.textContent = "ドッグケアレッスン"; sub.textContent = "BASE TRAINING";
    pw.style.display = "none"; pl.style.display = "none";
  } else if (mode === "menu") {
    backBtn.classList.add("visible");
    const dog = dogs.find(d=>d.id===currentDogId);
    icon.textContent = dog.emoji; title.textContent = dog.name; sub.textContent = "メニューを選ぶ";
    pw.style.display = "none"; pl.style.display = "none";
  } else if (mode === "training") {
    backBtn.classList.add("visible");
    const menu = MENUS.find(m=>m.id===currentMenuId);
    icon.textContent = menu.icon; title.textContent = menu.title;
    const completed = loadCompleted(currentDogId, currentMenuId);
    sub.textContent = "";
    pw.style.display = "block"; pl.style.display = "block";
    document.getElementById("progressFill").style.width = Math.round(completed.length/menu.stages.length*100)+"%";
    document.getElementById("progressLabel").textContent = `STEP ${completed.length} / ${menu.stages.length}`;
  }
}

let selectedEmoji = "🐕";

function renderDogScreen() {
  const list = document.getElementById("dogList");
  list.innerHTML = "";
  dogs.forEach(dog => {
    const card = document.createElement("div");
    card.className = "dog-card";
    card.onclick = () => selectDog(dog.id);
    const total = MENUS.reduce((acc,m) => acc + m.stages.length, 0);
    const done = MENUS.reduce((acc,m) => acc + loadCompleted(dog.id, m.id).length, 0);
    card.innerHTML = `
      <div class="dog-avatar">${dog.emoji}</div>
      <div class="dog-info">
        <div class="dog-name">${esc(dog.name)}</div>
        <div class="dog-meta">達成 ${done} / ${total} ステップ</div>
      </div>
      <div class="dog-arrow">›</div>`;
    list.appendChild(card);
  });
}

function showAddDogForm() {
  document.getElementById("addDogBtn").style.display = "none";
  document.getElementById("addDogForm").classList.add("open");
  const row = document.getElementById("emojiRow");
  row.innerHTML = "";
  selectedEmoji = DOG_EMOJIS[0];
  DOG_EMOJIS.forEach((e,i) => {
    const btn = document.createElement("div");
    btn.className = "emoji-opt" + (i===0?" selected":"");
    btn.textContent = e;
    btn.onclick = () => { document.querySelectorAll(".emoji-opt").forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); selectedEmoji = e; };
    row.appendChild(btn);
  });
  document.getElementById("newDogName").value = "";
  document.getElementById("newDogName").focus();
}

function cancelAddDog() {
  document.getElementById("addDogForm").classList.remove("open");
  document.getElementById("addDogBtn").style.display = "";
}

function saveDog() {
  const name = document.getElementById("newDogName").value.trim();
  if (!name) { toast("名前を入力してください"); return; }
  dogs.push({ id: Date.now().toString(), name, emoji: selectedEmoji });
  saveDogs(); cancelAddDog(); renderDogScreen(); toast("追加しました 🐾");
}

function selectDog(id) {
  currentDogId = id; renderMenuScreen(); showScreen("screenMenu"); updateHeader("menu");
}

function confirmDeleteDog() {
  const dog = dogs.find(d=>d.id===currentDogId);
  if (!confirm(`「${dog.name}」のデータをすべて削除しますか？`)) return;
  MENUS.forEach(m => {
    m.stages.forEach((_,i) => { localStorage.removeItem(dogKey(currentDogId,m.id,"chk_"+i)); localStorage.removeItem(dogKey(currentDogId,m.id,"log_"+i)); });
    localStorage.removeItem(dogKey(currentDogId,m.id,"done"));
  });
  dogs = dogs.filter(d=>d.id!==currentDogId);
  saveDogs(); currentDogId = null; renderDogScreen(); showScreen("screenDog"); updateHeader("dog"); toast("削除しました");
}

function renderMenuScreen() {
  const dog = dogs.find(d=>d.id===currentDogId);
  document.getElementById("menuDogInfo").innerHTML = `
    <div class="menu-dog-avatar">${dog.emoji}</div>
    <div><div class="menu-dog-name">${esc(dog.name)}</div><div class="menu-dog-sub">メニューを選んでください</div></div>`;
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  MENUS.forEach(menu => {
    const completed = loadCompleted(currentDogId, menu.id);
    const total = menu.stages.length;
    const done = completed.length;
    const card = document.createElement("div");
    card.className = "menu-card";
    card.onclick = () => selectMenu(menu.id);
    card.innerHTML = `
      <div class="menu-card-icon"><img src="${menu.icon}" alt="${menu.title}"></div>
      <div class="menu-card-title">${menu.title}</div>
      <div class="menu-card-progress">${done} / ${total} STEP</div>
      <div class="menu-card-bar"><div class="menu-card-bar-fill" style="width:${Math.round(done/total*100)}%"></div></div>`;
    grid.appendChild(card);
  });
}

function selectMenu(id) {
  currentMenuId = id; openStageIdx = null; history = [];
  renderTrainingScreen(); showScreen("screenTraining"); updateHeader("training");
}

function getState(idx, completed) {
  if (completed.includes(idx)) return "completed";
  const hi = completed.length > 0 ? Math.min(Math.max(...completed)+1, MENUS.find(m=>m.id===currentMenuId).stages.length-1) : 0;
  return idx === hi ? "current" : "locked";
}

function allChecked(dogId, menuId, stageIdx, menu) {
  const checks = loadChecks(dogId, menuId, stageIdx);
  return menu.stages[stageIdx].checks.every((_,i) => !!checks[i]);
}

function toggleCheck(stageIdx, checkIdx) {
  const checks = loadChecks(currentDogId, currentMenuId, stageIdx);
  history.push({ type:"check", stageIdx, checkIdx, prev: !!checks[checkIdx] });
  checks[checkIdx] = !checks[checkIdx];
  saveChecks(currentDogId, currentMenuId, stageIdx, checks);
  renderTrainingScreen();
}

function addLog(stageIdx) {
  const ta = document.getElementById("log-note-"+stageIdx);
  const note = (ta?.value||"").trim();
  const logs = loadLogs(currentDogId, currentMenuId, stageIdx);
  const entry = { ts: Date.now(), note: note||"（メモなし）" };
  history.push({ type:"log", stageIdx, entry });
  logs.unshift(entry);
  if(logs.length>30) logs.length=30;
  saveLogs(currentDogId, currentMenuId, stageIdx, logs);
  if(ta) ta.value="";
  renderTrainingScreen(); toast("記録しました 📝");
}

function completeStage(stageIdx) {
  const menu = MENUS.find(m=>m.id===currentMenuId);
  if (!allChecked(currentDogId, currentMenuId, stageIdx, menu)) return;
  let completed = loadCompleted(currentDogId, currentMenuId);
  if (!completed.includes(stageIdx)) {
    history.push({ type:"complete", stageIdx, prev: [...completed] });
    completed.push(stageIdx);
    saveCompleted(currentDogId, currentMenuId, completed);
  }
  const nextIdx = stageIdx+1;
  openStageIdx = nextIdx < menu.stages.length ? nextIdx : null;
  renderTrainingScreen(); updateHeader("training");
  if (nextIdx < menu.stages.length) {
    toast(`🔓 STEP ${nextIdx+1} の扉が開きました！`);
    setTimeout(()=>{
      const el = document.getElementById("stage-card-"+nextIdx);
      if(el){ el.classList.add("just-unlocked"); el.scrollIntoView({behavior:"smooth",block:"start"}); setTimeout(()=>el.classList.remove("just-unlocked"),600); }
    },200);
  } else {
    toast("🏆 全ステップ達成！おめでとうございます！");
    renderMenuScreen();
  }
}

function undoLast() {
  if (history.length === 0) { toast("戻せる操作がありません"); return; }
  const last = history.pop();
  if (last.type === "check") {
    const checks = loadChecks(currentDogId, currentMenuId, last.stageIdx);
    checks[last.checkIdx] = last.prev;
    saveChecks(currentDogId, currentMenuId, last.stageIdx, checks);
  } else if (last.type === "log") {
    const logs = loadLogs(currentDogId, currentMenuId, last.stageIdx);
    const idx = logs.findIndex(l => l.ts === last.entry.ts);
    if (idx > -1) logs.splice(idx,1);
    saveLogs(currentDogId, currentMenuId, last.stageIdx, logs);
  } else if (last.type === "complete") {
    saveCompleted(currentDogId, currentMenuId, last.prev);
    openStageIdx = last.stageIdx;
    updateHeader("training");
  }
  renderTrainingScreen(); toast("元に戻しました ↩");
}

function renderTrainingScreen() {
  const menu = MENUS.find(m=>m.id===currentMenuId);
  const completed = loadCompleted(currentDogId, currentMenuId);
  const container = document.getElementById("stagesContainer");
  container.innerHTML = "";
  const emojis = ["🪑","🛏️","🤝","🫦"];

  menu.stages.forEach((stage, idx) => {
    const state = getState(idx, completed);
    const checks = loadChecks(currentDogId, currentMenuId, idx);
    const logs = loadLogs(currentDogId, currentMenuId, idx);
    const isOpen = openStageIdx === idx;
    const canComplete = allChecked(currentDogId, currentMenuId, idx, menu);
    const hasHistory = history.length > 0;

    const badge = state==="completed" ? "✅" : state==="current" ? emojis[Math.min(idx,emojis.length-1)] : `<span style="font-size:14px;color:var(--locked)">🔒</span>`;

    const checkHTML = stage.checks.map((text,i) => {
      const chk = !!checks[i];
      return `<div class="check-item ${chk?'checked':''}" onclick="toggleCheck(${idx},${i})">
        <div class="check-box">${chk?'✓':''}</div>
        <div class="check-text">${esc(text)}</div>
      </div>`;
    }).join("");

    const logsHTML = logs.length===0
      ? `<div style="font-size:11px;color:var(--locked);padding:3px 0;">まだ記録がありません</div>`
      : logs.map(l=>`<div class="log-entry"><div class="log-date">${fmtDate(l.ts)}</div><div>${esc(l.note)}</div></div>`).join("");

    const completeHTML = state!=="completed"
      ? `<button class="btn-complete" onclick="completeStage(${idx})" ${canComplete?'':'disabled'}>
           ${canComplete ? '🎉 このステップ達成！次の扉を開く' : '🔒 チェックをすべて埋めると進めます'}
         </button>`
      : `<div style="text-align:center;font-size:11px;color:var(--accent);padding-top:6px;letter-spacing:0.06em;">✅ 達成済み</div>`;

    const card = document.createElement("div");
    card.className = `stage-card ${state}`;
    card.id = "stage-card-"+idx;
    card.innerHTML = `
      <div class="stage-header" ${state!=="locked"?`onclick="toggleStageOpen(${idx})"`:""}>
        <div class="stage-num">${idx+1}</div>
        <div class="stage-info">
          <div class="stage-label">STEP ${idx+1}</div>
          <div class="stage-title">${stage.title}</div>
        </div>
        <div class="stage-badge">${badge}</div>
      </div>
      <div class="stage-body ${isOpen?'open':''}" id="stage-body-${idx}">
        <div class="stage-desc">${stage.desc}</div>
        <div class="checklist">
          <div class="checklist-title">☑ チェック項目</div>
          ${checkHTML}
          ${!canComplete&&state!=='completed'?`<div class="check-hint">すべてチェックで次のステップへ進めます</div>`:''}
        </div>
        <div class="log-section">
          <div class="log-title-row">
            <div class="log-title">📝 練習メモ</div>
            <button class="undo-btn" onclick="undoLast()" ${hasHistory?'':'disabled'}>↩ 元に戻す</button>
          </div>
          <div class="log-entries">${logsHTML}</div>
          <div class="log-input-wrap">
            <textarea id="log-note-${idx}" placeholder="今日の様子をメモ（任意）"></textarea>
            <div class="log-btn-row">
              <button class="btn-log" onclick="addLog(${idx})">記録する</button>
              <button class="btn-clr" onclick="document.getElementById('log-note-${idx}').value=''">消す</button>
            </div>
            ${completeHTML}
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function toggleStageOpen(idx) {
  const completed = loadCompleted(currentDogId, currentMenuId);
  if(getState(idx, completed)==="locked") return;
  openStageIdx = openStageIdx===idx ? null : idx;
  renderTrainingScreen();
  if(openStageIdx===idx) setTimeout(()=>document.getElementById("stage-card-"+idx)?.scrollIntoView({behavior:"smooth",block:"start"}),50);
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

loadDogs();
renderDogScreen();
updateHeader("dog");
</script>
</body>
</html>
